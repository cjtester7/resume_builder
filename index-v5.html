<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Optimizer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #ddd9d0;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #2e5c3e;
      --accent-light: #eaf2ec;
      --accent-border: #c2dbc8;
      --danger: #c0392b;
      --danger-light: #fdf0ee;
      --danger-border: #f0c5be;
      --success: #2e5c3e;
      --warn: #8a5c00;
      --warn-light: #fdf6e3;
      --warn-border: #f0dfa0;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .container { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 36px; }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    header p { font-size: 15px; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 160px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }

    input[type="text"] {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .fields-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      align-items: end;
    }

    @media (max-width: 640px) {
      .fields, .fields-3 { grid-template-columns: 1fr; }
      header h1 { font-size: 28px; }
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn-primary {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 11px 24px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-secondary:hover { background: var(--accent-light); }
    .btn-secondary:active { transform: scale(0.98); }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-text { font-size: 13px; color: var(--muted); }
    .status-text.error { color: var(--danger); }
    .status-text.success { color: var(--success); }

    /* Output card */
    #outputSection { display: none; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .card-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
    }

    .download-group { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-download {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-download:hover { background: #d6ebda; }
    .btn-download:active { transform: scale(0.97); }

    #output {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      min-height: 200px;
    }

    /* Fit Analysis */
    #fitSection { display: none; }

    .verdict-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .verdict-strong { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
    .verdict-partial { background: var(--warn-light); color: var(--warn); border: 1px solid var(--warn-border); }
    .verdict-weak { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-border); }

    .fit-headline {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin: 12px 0 20px;
    }

    .fit-section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .fit-items { display: flex; flex-direction: column; gap: 8px; }

    .fit-item {
      border-radius: 6px;
      padding: 12px 14px;
      border-left: 3px solid transparent;
    }

    .fit-item.positive {
      background: var(--accent-light);
      border-left-color: var(--accent);
    }

    .fit-item.negative {
      background: var(--danger-light);
      border-left-color: var(--danger);
    }

    .fit-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .fit-item-detail {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .fit-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .fit-summary {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 12px;
    }

    .fit-directions {
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }

    .fit-comp {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      margin-top: 10px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #c2dbc8;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Resume Optimizer</h1>
    <p>Paste your resume and a job description — optimize it for the role or check your fit.</p>
  </header>

  <!-- Input card -->
  <div class="card">
    <div class="fields" style="margin-bottom: 20px;">
      <div>
        <label>Your Resume</label>
        <textarea id="resume" placeholder="Paste your current resume here..."></textarea>
      </div>
      <div>
        <label>Job Description</label>
        <textarea id="jobDesc" placeholder="Paste the job description here..."></textarea>
      </div>
    </div>

    <div>
      <label>Pay Target <span style="font-size:11px; text-transform:none; letter-spacing:0; color:var(--muted);">— optional, used for fit analysis</span></label>
      <input type="text" id="payTarget" placeholder="e.g. $95,000 or $85K–$100K" style="max-width: 280px;" />
    </div>

    <div class="actions">
      <button class="btn-primary" id="optimizeBtn" onclick="optimizeResume()">Optimize Resume</button>
      <button class="btn-secondary" id="fitBtn" onclick="runFitAnalysis()">Am I a Good Fit?</button>
      <span class="status-text" id="status"></span>
    </div>
  </div>

  <!-- Optimized output -->
  <div id="outputSection">
    <div class="card">
      <div class="card-header">
        <h2>Optimized Resume</h2>
        <div class="download-group">
          <button class="btn-download" onclick="downloadTxt()">&#8595; TXT</button>
          <button class="btn-download" onclick="downloadPdf()">&#8595; PDF</button>
          <button class="btn-download" id="wordBtn" onclick="downloadDocx()">&#8595; Word</button>
        </div>
      </div>
      <div id="output"></div>
    </div>
  </div>

  <!-- Fit analysis output -->
  <div id="fitSection">
    <div class="card">
      <div class="card-header">
        <h2>Fit Analysis</h2>
      </div>
      <div id="fitContent"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

<script>
let optimizedText = "";

// ── Optimize ──────────────────────────────────────────────────────────────────
async function optimizeResume() {
  const resume = document.getElementById("resume").value.trim();
  const jobDesc = document.getElementById("jobDesc").value.trim();
  const status = document.getElementById("status");
  const output = document.getElementById("output");
  const btn = document.getElementById("optimizeBtn");
  const outputSection = document.getElementById("outputSection");

  if (!resume || !jobDesc) {
    status.className = "status-text error";
    status.innerText = "Please fill in both fields.";
    return;
  }

  btn.disabled = true;
  status.className = "status-text";
  status.innerHTML = '<span class="spinner"></span>Optimizing...';
  outputSection.style.display = "none";
  optimizedText = "";

  try {
    const response = await fetch("/.netlify/functions/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume: resume, jobDescription: jobDesc })
    });

    if (!response.ok) throw new Error("Server returned " + response.status);
    const data = await response.json();

    if (data.result) {
      optimizedText = data.result;
      output.innerText = optimizedText;
      outputSection.style.display = "block";
      status.className = "status-text success";
      status.innerText = "Done! Review and download below.";
    } else {
      throw new Error(data.error || "No result returned");
    }
  } catch (err) {
    status.className = "status-text error";
    status.innerText = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Fit Analysis ──────────────────────────────────────────────────────────────
async function runFitAnalysis() {
  const resume = document.getElementById("resume").value.trim();
  const jobDesc = document.getElementById("jobDesc").value.trim();
  const payTarget = document.getElementById("payTarget").value.trim();
  const status = document.getElementById("status");
  const fitSection = document.getElementById("fitSection");
  const fitContent = document.getElementById("fitContent");
  const btn = document.getElementById("fitBtn");

  if (!resume || !jobDesc) {
    status.className = "status-text error";
    status.innerText = "Please fill in both fields.";
    return;
  }

  btn.disabled = true;
  status.className = "status-text";
  status.innerHTML = '<span class="spinner"></span>Analyzing fit...';
  fitSection.style.display = "none";
  fitContent.innerHTML = "";

  try {
    const response = await fetch("/.netlify/functions/fit-analysis", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume: resume, jobDescription: jobDesc, payTarget: payTarget })
    });

    if (!response.ok) throw new Error("Server returned " + response.status);
    const data = await response.json();

    if (data.analysis) {
      renderFitAnalysis(data.analysis);
      fitSection.style.display = "block";
      fitSection.scrollIntoView({ behavior: "smooth", block: "start" });
      status.className = "status-text success";
      status.innerText = "Analysis complete.";
    } else {
      throw new Error(data.error || "No analysis returned");
    }
  } catch (err) {
    status.className = "status-text error";
    status.innerText = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
}

function renderFitAnalysis(a) {
  var verdictClass = "verdict-" + (a.verdict || "partial");
  var verdictLabel = { strong: "Strong Fit", partial: "Partial Fit", weak: "Weak Fit" }[a.verdict] || "Partial Fit";

  var alignmentHtml = (a.alignment || []).map(function(item) {
    return '<div class="fit-item positive"><div class="fit-item-title">' + esc(item.title) + '</div><div class="fit-item-detail">' + esc(item.detail) + '</div></div>';
  }).join("");

  var gapsHtml = (a.gaps || []).map(function(item) {
    return '<div class="fit-item negative"><div class="fit-item-title">' + esc(item.title) + '</div><div class="fit-item-detail">' + esc(item.detail) + '</div></div>';
  }).join("");

  var compHtml = a.compensation ? '<p class="fit-comp">' + esc(a.compensation) + '</p>' : "";

  document.getElementById("fitContent").innerHTML =
    '<span class="verdict-badge ' + verdictClass + '">' + verdictLabel + '</span>' +
    '<p class="fit-headline">' + esc(a.headline) + '</p>' +

    '<p class="fit-section-label">Where alignment exists</p>' +
    '<div class="fit-items">' + alignmentHtml + '</div>' +

    '<p class="fit-section-label">Critical gaps to address</p>' +
    '<div class="fit-items">' + gapsHtml + '</div>' +

    compHtml +

    '<hr class="fit-divider" />' +
    '<p class="fit-summary">' + esc(a.summary) + '</p>' +
    '<div class="fit-directions">' + esc(a.directions) + '</div>';
}

function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── TXT ───────────────────────────────────────────────────────────────────────
function downloadTxt() {
  if (!optimizedText) return;
  triggerDownload(new Blob([optimizedText], { type: "text/plain" }), "optimized-resume.txt");
}

// ── PDF ───────────────────────────────────────────────────────────────────────
function downloadPdf() {
  if (!optimizedText) return;
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit: "pt", format: "letter" });
  var margin = 60;
  var maxWidth = doc.internal.pageSize.getWidth() - margin * 2;
  var lineHeight = 15;
  var y = margin;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);

  var lines = doc.splitTextToSize(optimizedText, maxWidth);
  lines.forEach(function(line) {
    if (y + lineHeight > doc.internal.pageSize.getHeight() - margin) {
      doc.addPage();
      y = margin;
    }
    doc.text(line, margin, y);
    y += lineHeight;
  });

  doc.save("optimized-resume.pdf");
}

// ── WORD ──────────────────────────────────────────────────────────────────────
async function downloadDocx() {
  var wordBtn = document.getElementById("wordBtn");
  if (!optimizedText) return;

  wordBtn.innerText = "Building...";
  wordBtn.disabled = true;

  try {
    var DocxLib = window.docx;
    var Document = DocxLib.Document;
    var Packer = DocxLib.Packer;
    var Paragraph = DocxLib.Paragraph;
    var TextRun = DocxLib.TextRun;

    var paragraphs = optimizedText.split("\n").map(function(line) {
      var trimmed = line.trim();
      var isBullet = trimmed.startsWith("-") || trimmed.startsWith("*") || trimmed.startsWith("\u2022");
      return new Paragraph({
        children: [new TextRun({ text: trimmed, size: 22, font: "Calibri" })],
        spacing: { after: isBullet ? 60 : 160 },
        indent: isBullet ? { left: 360 } : {}
      });
    });

    var document = new Document({ sections: [{ children: paragraphs }] });
    var blob = await Packer.toBlob(document);
    triggerDownload(blob, "optimized-resume.docx");
  } catch(err) {
    alert("Word export failed: " + err.message);
  } finally {
    wordBtn.innerHTML = "&#8595; Word";
    wordBtn.disabled = false;
  }
}

// ── Helper ────────────────────────────────────────────────────────────────────
function triggerDownload(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
