<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Optimizer</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background: #fff;
      color: #222;
    }
    h2 {
      font-size: 22px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 16px;
      font-size: 14px;
      padding: 10px;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      padding: 10px 22px;
      font-size: 15px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #fff;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      display: inline-block;
      margin-left: 14px;
      font-size: 14px;
      font-weight: bold;
      vertical-align: middle;
    }
    #output {
      display: none;
      white-space: pre-wrap;
      margin-top: 24px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.7;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<h2>AI Resume Optimizer</h2>

<label>Base resume</label>
<textarea id="resume" placeholder="Paste your resume here..."></textarea>

<label>Job description</label>
<textarea id="jobDesc" placeholder="Paste the job description here..."></textarea>

<div style="margin-bottom: 10px;">
  <button id="optimizeBtn" onclick="optimizeResume()">Optimize Resume</button>
  <span id="status"></span>
</div>

<div id="output"></div>

<script>
async function optimizeResume() {
  const resume = document.getElementById("resume").value.trim();
  const jobDesc = document.getElementById("jobDesc").value.trim();
  const status = document.getElementById("status");
  const output = document.getElementById("output");
  const btn = document.getElementById("optimizeBtn");

  if (!resume || !jobDesc) {
    status.style.color = "red";
    status.innerText = "Please fill in both fields.";
    return;
  }

  btn.disabled = true;
  status.style.color = "#555";
  status.innerText = "⏳ Optimizing...";
  output.style.display = "none";
  output.innerText = "";

  try {
    const response = await fetch("/.netlify/functions/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume, jobDescription: jobDesc })
    });

    if (!response.ok) throw new Error("Server returned " + response.status);

    const data = await response.json();

    if (data.result) {
      output.innerText = data.result;
      output.style.display = "block";
      status.style.color = "green";
      status.innerText = "✅ Done!";
    } else {
      throw new Error(data.error || "No result returned");
    }
  } catch (err) {
    status.style.color = "red";
    status.innerText = "❌ Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
