<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Optimizer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #ddd9d0;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #2e5c3e;
      --accent-light: #eaf2ec;
      --danger: #c0392b;
      --success: #2e5c3e;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 36px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    header p {
      font-size: 15px;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 160px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .fields { grid-template-columns: 1fr; }
      header h1 { font-size: 28px; }
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn-primary {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 11px 24px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    #status {
      font-size: 13px;
      color: var(--muted);
    }

    #status.error { color: var(--danger); }
    #status.success { color: var(--success); }

    /* Output section */
    #outputSection {
      display: none;
    }

    #outputSection .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    #outputSection .card-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
    }

    .download-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-download {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid #c2dbc8;
      border-radius: 5px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn-download:hover { background: #d6ebda; }
    .btn-download:active { transform: scale(0.97); }

    #output {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      min-height: 200px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #c2dbc8;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Resume Optimizer</h1>
    <p>Paste your resume and a job description — we'll tailor it for the role.</p>
  </header>

  <div class="card">
    <div class="fields">
      <div>
        <label>Your Resume</label>
        <textarea id="resume" placeholder="Paste your current resume here..."></textarea>
      </div>
      <div>
        <label>Job Description</label>
        <textarea id="jobDesc" placeholder="Paste the job description here..."></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="optimizeBtn" onclick="optimizeResume()">Optimize Resume</button>
      <span id="status"></span>
    </div>
  </div>

  <div id="outputSection">
    <div class="card">
      <div class="card-header">
        <h2>Optimized Resume</h2>
        <div class="download-group">
          <button class="btn-download" onclick="downloadTxt()">↓ TXT</button>
          <button class="btn-download" onclick="downloadPdf()">↓ PDF</button>
          <button class="btn-download" onclick="downloadDocx()">↓ Word</button>
        </div>
      </div>
      <div id="output"></div>
    </div>
  </div>

</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.umd.min.js"></script>

<script>
let optimizedText = "";

async function optimizeResume() {
  const resume = document.getElementById("resume").value.trim();
  const jobDesc = document.getElementById("jobDesc").value.trim();
  const status = document.getElementById("status");
  const output = document.getElementById("output");
  const btn = document.getElementById("optimizeBtn");
  const outputSection = document.getElementById("outputSection");

  if (!resume || !jobDesc) {
    status.className = "error";
    status.innerText = "Please fill in both fields.";
    return;
  }

  btn.disabled = true;
  status.className = "";
  status.innerHTML = '<span class="spinner"></span>Optimizing...';
  outputSection.style.display = "none";
  optimizedText = "";

  try {
    const response = await fetch("/.netlify/functions/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume, jobDescription: jobDesc })
    });

    if (!response.ok) throw new Error("Server returned " + response.status);

    const data = await response.json();

    if (data.result) {
      optimizedText = data.result;
      output.innerText = optimizedText;
      outputSection.style.display = "block";
      status.className = "success";
      status.innerText = "Done! Review and download below.";
    } else {
      throw new Error(data.error || "No result returned");
    }
  } catch (err) {
    status.className = "error";
    status.innerText = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
}

// ── TXT ───────────────────────────────────────────────────────────────────────
function downloadTxt() {
  if (!optimizedText) return;
  const blob = new Blob([optimizedText], { type: "text/plain" });
  triggerDownload(blob, "optimized-resume.txt");
}

// ── PDF ───────────────────────────────────────────────────────────────────────
function downloadPdf() {
  if (!optimizedText) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "letter" });

  const margin = 60;
  const pageWidth = doc.internal.pageSize.getWidth();
  const maxWidth = pageWidth - margin * 2;
  const lineHeight = 15;
  let y = margin;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);

  const lines = doc.splitTextToSize(optimizedText, maxWidth);

  lines.forEach((line) => {
    if (y + lineHeight > doc.internal.pageSize.getHeight() - margin) {
      doc.addPage();
      y = margin;
    }
    doc.text(line, margin, y);
    y += lineHeight;
  });

  doc.save("optimized-resume.pdf");
}

// ── WORD ──────────────────────────────────────────────────────────────────────
async function downloadDocx() {
  if (!optimizedText) return;
  const { Document, Packer, Paragraph, TextRun } = docx;

  const paragraphs = optimizedText.split("\n").map((line) =>
    new Paragraph({
      children: [new TextRun({ text: line, size: 22, font: "Calibri" })],
      spacing: { after: 120 },
    })
  );

  const doc = new Document({ sections: [{ children: paragraphs }] });
  const blob = await Packer.toBlob(doc);
  triggerDownload(blob, "optimized-resume.docx");
}

// ── Helper ────────────────────────────────────────────────────────────────────
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
