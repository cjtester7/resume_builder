# FILE:    netlify.toml
# VERSION: v7
# UPDATED: 2026-05-01
# CHANGES: v1: Initial — publish, functions, optimizer redirect.
#          v2: Added builder redirect.
#          v3: Added esbuild bundler, Stripe webhook redirect.
#          v4: Function timeouts set to 26s for cover-letter, optimize, fit-analysis, build-resume.
#              Builder redirect updated to builder.html.
#          v5: Redirect updated to index-v15.html.
#          v6: Redirect updated to index-v16.html.
#          v7: Redirect updated to index-v17.html.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Increase timeout for all functions to 26 seconds (Netlify free plan max)
[functions."cover-letter"]
  timeout = 26

[functions."optimize"]
  timeout = 26

[functions."fit-analysis"]
  timeout = 26

[functions."build-resume"]
  timeout = 26

# Optimizer
[[redirects]]
  from = "/optimizer"
  to = "/index-v17.html"
  status = 200

# Builder
[[redirects]]
  from = "/builder"
  to = "/builder.html"
  status = 200

# Stripe webhook — must NOT be cached or redirected
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
