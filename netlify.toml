[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Optimizer
[[redirects]]
  from = "/optimizer"
  to = "/index-v10.html"
  status = 200

# Builder
[[redirects]]
  from = "/builder"
  to = "/builder-v16.html"
  status = 200

# Stripe webhook — must NOT be cached or redirected
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
