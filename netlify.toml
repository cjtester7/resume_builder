[build]
  publish = "."
  functions = "netlify/functions"

# Landing page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Optimizer (previously the root)
[[redirects]]
  from = "/optimizer"
  to = "/index-v10.html"
  status = 200

# Builder
[[redirects]]
  from = "/builder"
  to = "/builder.html"
  status = 200
