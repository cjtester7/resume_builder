<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Optimizer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #ddd9d0;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #2e5c3e;
      --accent-light: #eaf2ec;
      --accent-border: #c2dbc8;
      --danger: #c0392b;
      --danger-light: #fdf0ee;
      --danger-border: #f0c5be;
      --success: #2e5c3e;
      --warn: #8a5c00;
      --warn-light: #fdf6e3;
      --warn-border: #f0dfa0;
      --radius: 10px;
      --syn-focus: #1a7a3a;
      --syn-alt: #1a5fa8;
      --syn-selected: #c0392b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .container { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 36px; }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    header p { font-size: 15px; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 160px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }

    input[type="text"] {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .fields { grid-template-columns: 1fr; }
      header h1 { font-size: 28px; }
      .actions { flex-direction: column; align-items: stretch; }
    }

    .pay-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .pay-row .pay-field { flex: 0 0 280px; }

    .pay-row .pay-hint {
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 11px;
      white-space: nowrap;
    }

    .pay-extracted {
      font-size: 11px;
      color: var(--accent);
      margin-top: 5px;
      display: none;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-primary {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 11px 22px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-secondary:hover { background: var(--accent-light); }
    .btn-secondary:active { transform: scale(0.98); }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-text { font-size: 13px; color: var(--muted); }
    .status-text.error { color: var(--danger); }
    .status-text.success { color: var(--success); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .card-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
    }

    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .btn-download {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-download:hover { background: #d6ebda; }
    .btn-download:active { transform: scale(0.97); }

    .btn-synonym {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--syn-alt);
      background: #e8f0fb;
      border: 1px solid #b8d0f0;
      border-radius: 5px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-synonym:hover { background: #d0e4f8; }
    .btn-synonym:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Plain text output */
    #outputSection, #coverSection { display: none; }

    .text-output {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      min-height: 200px;
      white-space: pre-wrap;
    }

    /* Synonym swap view */
    .syn-output {
      font-size: 14px;
      line-height: 2;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      min-height: 200px;
    }

    .syn-output .plain-line { display: block; margin-bottom: 2px; }

    .syn-output .syn-sentence { display: block; margin-bottom: 6px; }

    .focus-word {
      color: var(--syn-focus);
      font-weight: 500;
      cursor: default;
    }

    .focus-word::before { content: '"'; }
    .focus-word::after { content: '"'; }

    .syn-bracket { color: var(--muted); font-size: 13px; }

    .syn-alt-word {
      color: var(--syn-alt);
      cursor: pointer;
      font-size: 13px;
      text-decoration: underline;
      text-decoration-style: dotted;
      transition: color 0.1s;
    }

    .syn-alt-word:hover { color: #0f3d6e; }

    .syn-alt-word.selected {
      color: var(--syn-selected);
      font-weight: 500;
      text-decoration: none;
    }

    .btn-change {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #fff;
      background: var(--syn-selected);
      border: none;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      margin-left: 6px;
      vertical-align: middle;
      transition: opacity 0.1s;
    }

    .btn-change:hover { opacity: 0.85; }

    /* Fit Analysis */
    #fitSection { display: none; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .score-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      font-weight: 500;
    }

    .score-strong { background: var(--accent-light); color: var(--accent); border: 2px solid var(--accent-border); }
    .score-partial { background: var(--warn-light); color: var(--warn); border: 2px solid var(--warn-border); }
    .score-weak { background: var(--danger-light); color: var(--danger); border: 2px solid var(--danger-border); }

    .score-meta { flex: 1; }

    .verdict-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 6px;
    }

    .verdict-strong { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
    .verdict-partial { background: var(--warn-light); color: var(--warn); border: 1px solid var(--warn-border); }
    .verdict-weak { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-border); }

    .fit-headline { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
    .fit-section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }
    .fit-items { display: flex; flex-direction: column; gap: 8px; }

    .fit-item { border-radius: 6px; padding: 12px 14px; border-left: 3px solid transparent; }
    .fit-item.positive { background: var(--accent-light); border-left-color: var(--accent); }
    .fit-item.negative { background: var(--danger-light); border-left-color: var(--danger); }
    .fit-item-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .fit-item-detail { font-size: 13px; color: var(--muted); line-height: 1.55; }
    .fit-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .fit-summary { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 12px; }
    .fit-directions { font-size: 13px; line-height: 1.65; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
    .fit-comp { font-size: 13px; line-height: 1.6; color: var(--muted); margin-top: 10px; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #c2dbc8;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Resume Optimizer</h1>
    <p>Paste your resume and a job description — optimize, analyze your fit, or generate a cover letter.</p>
  </header>

  <!-- Input card -->
  <div class="card">
    <div class="fields" style="margin-bottom: 20px;">
      <div>
        <label>Your Resume</label>
        <textarea id="resume" placeholder="Paste your current resume here..."></textarea>
      </div>
      <div>
        <label>Job Description</label>
        <textarea id="jobDesc" placeholder="Paste the job description here..." oninput="schedulePayExtract()"></textarea>
      </div>
    </div>

    <div class="pay-row">
      <div class="pay-field">
        <label>Pay Target <span style="font-size:11px; text-transform:none; letter-spacing:0; font-weight:400;">— optional</span></label>
        <input type="text" id="payTarget" placeholder="e.g. $95,000 or $85K–$100K" />
        <div class="pay-extracted" id="payExtracted"></div>
      </div>
      <div class="pay-hint">Used for fit analysis compensation comparison</div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="optimizeBtn" onclick="optimizeResume()">Optimize Resume</button>
      <button class="btn-secondary" id="fitBtn" onclick="runFitAnalysis()">Am I a Good Fit?</button>
      <button class="btn-secondary" id="coverBtn" onclick="generateCoverLetter()">Generate Cover Letter</button>
      <span class="status-text" id="status"></span>
    </div>
  </div>

  <!-- Optimized resume output -->
  <div id="outputSection">
    <div class="card">
      <div class="card-header">
        <h2>Optimized Resume</h2>
        <div class="btn-group">
          <button class="btn-synonym" id="resumeSynBtn" onclick="toggleSynonymView('resume')">&#10031; Synonym Swap</button>
          <button class="btn-download" onclick="downloadTxt('resume')">&#8595; TXT</button>
          <button class="btn-download" onclick="downloadPdf('resume')">&#8595; PDF</button>
          <button class="btn-download" id="wordBtn" onclick="downloadDocx('resume')">&#8595; Word</button>
        </div>
      </div>
      <div id="resumeOutputWrap">
        <div id="output" class="text-output"></div>
      </div>
    </div>
  </div>

  <!-- Fit analysis -->
  <div id="fitSection">
    <div class="card">
      <div class="card-header">
        <h2>Fit Analysis</h2>
        <div class="btn-group">
          <button class="btn-download" onclick="downloadFitPdf()">&#8595; PDF</button>
        </div>
      </div>
      <div id="fitContent"></div>
    </div>
  </div>

  <!-- Cover letter output -->
  <div id="coverSection">
    <div class="card">
      <div class="card-header">
        <h2>Cover Letter</h2>
        <div class="btn-group">
          <button class="btn-synonym" id="coverSynBtn" onclick="toggleSynonymView('cover')">&#10031; Synonym Swap</button>
          <button class="btn-download" onclick="downloadTxt('cover')">&#8595; TXT</button>
          <button class="btn-download" onclick="downloadPdf('cover')">&#8595; PDF</button>
          <button class="btn-download" id="coverWordBtn" onclick="downloadDocx('cover')">&#8595; Word</button>
        </div>
      </div>
      <div id="coverOutputWrap">
        <div id="coverOutput" class="text-output"></div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

<script>
var optimizedText = "";
var coverText = "";
var fitData = null;
var payExtractTimer = null;

// Track synonym view state
var synState = {
  resume: { active: false, data: null, currentText: "" },
  cover:  { active: false, data: null, currentText: "" }
};

// ── Auto-extract pay ──────────────────────────────────────────────────────────
function schedulePayExtract() {
  clearTimeout(payExtractTimer);
  payExtractTimer = setTimeout(function() {
    var jobDesc = document.getElementById("jobDesc").value.trim();
    if (jobDesc.length < 100) return;
    extractPay(jobDesc);
  }, 1500);
}

async function extractPay(jobDesc) {
  try {
    var r = await fetch("/.netlify/functions/extract-pay", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ jobDescription: jobDesc })
    });
    var d = await r.json();
    var hint = document.getElementById("payExtracted");
    var payField = document.getElementById("payTarget");
    if (d.pay && !payField.value.trim()) {
      payField.value = d.pay;
      hint.innerText = "Pay range detected from job description";
      hint.style.display = "block";
    }
  } catch(e) {}
}

// ── Optimize Resume ───────────────────────────────────────────────────────────
async function optimizeResume() {
  var resume = document.getElementById("resume").value.trim();
  var jobDesc = document.getElementById("jobDesc").value.trim();
  var btn = document.getElementById("optimizeBtn");
  if (!resume || !jobDesc) { setStatus("error", "Please fill in both fields."); return; }

  btn.disabled = true;
  setStatus("", '<span class="spinner"></span>Optimizing...');
  document.getElementById("outputSection").style.display = "none";
  optimizedText = "";
  synState.resume = { active: false, data: null, currentText: "" };

  try {
    var r = await fetch("/.netlify/functions/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume: resume, jobDescription: jobDesc })
    });
    if (!r.ok) throw new Error("Server returned " + r.status);
    var d = await r.json();
    if (d.result) {
      optimizedText = d.result;
      synState.resume.currentText = optimizedText;
      document.getElementById("output").innerText = optimizedText;
      document.getElementById("resumeSynBtn").innerText = "\u2731 Synonym Swap";
      document.getElementById("outputSection").style.display = "block";
      document.getElementById("outputSection").scrollIntoView({ behavior: "smooth", block: "start" });
      setStatus("success", "Done! Review and download below.");
    } else { throw new Error(d.error || "No result returned"); }
  } catch(err) { setStatus("error", "Error: " + err.message); }
  finally { btn.disabled = false; }
}

// ── Fit Analysis ──────────────────────────────────────────────────────────────
async function runFitAnalysis() {
  var resume = document.getElementById("resume").value.trim();
  var jobDesc = document.getElementById("jobDesc").value.trim();
  var payTarget = document.getElementById("payTarget").value.trim();
  var btn = document.getElementById("fitBtn");
  if (!resume || !jobDesc) { setStatus("error", "Please fill in both fields."); return; }

  btn.disabled = true;
  setStatus("", '<span class="spinner"></span>Analyzing fit...');
  document.getElementById("fitSection").style.display = "none";
  fitData = null;

  try {
    var r = await fetch("/.netlify/functions/fit-analysis", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume: resume, jobDescription: jobDesc, payTarget: payTarget })
    });
    if (!r.ok) throw new Error("Server returned " + r.status);
    var d = await r.json();
    if (d.analysis) {
      fitData = d.analysis;
      renderFitAnalysis(fitData);
      document.getElementById("fitSection").style.display = "block";
      document.getElementById("fitSection").scrollIntoView({ behavior: "smooth", block: "start" });
      setStatus("success", "Analysis complete.");
    } else { throw new Error(d.error || "No analysis returned"); }
  } catch(err) { setStatus("error", "Error: " + err.message); }
  finally { btn.disabled = false; }
}

function renderFitAnalysis(a) {
  var score = typeof a.score === "number" ? a.score : 0;
  var verdict = a.verdict || "partial";
  var verdictLabel = { strong: "Strong Fit", partial: "Partial Fit", weak: "Weak Fit" }[verdict] || "Partial Fit";

  var alignHtml = (a.alignment || []).map(function(item) {
    return '<div class="fit-item positive"><div class="fit-item-title">' + esc(item.title) + '</div><div class="fit-item-detail">' + esc(item.detail) + '</div></div>';
  }).join("");

  var gapsHtml = (a.gaps || []).map(function(item) {
    return '<div class="fit-item negative"><div class="fit-item-title">' + esc(item.title) + '</div><div class="fit-item-detail">' + esc(item.detail) + '</div></div>';
  }).join("");

  var compHtml = a.compensation ? '<p class="fit-comp">' + esc(a.compensation) + '</p>' : "";

  document.getElementById("fitContent").innerHTML =
    '<div class="score-row"><div class="score-circle score-' + verdict + '">' + score + '%</div>' +
    '<div class="score-meta"><span class="verdict-badge verdict-' + verdict + '">' + verdictLabel + '</span>' +
    '<div class="fit-headline">' + esc(a.headline) + '</div></div></div>' +
    '<p class="fit-section-label">Where alignment exists</p><div class="fit-items">' + alignHtml + '</div>' +
    '<p class="fit-section-label">Critical gaps to address</p><div class="fit-items">' + gapsHtml + '</div>' +
    compHtml +
    '<hr class="fit-divider" /><p class="fit-summary">' + esc(a.summary) + '</p>' +
    '<div class="fit-directions">' + esc(a.directions) + '</div>';
}

// ── Cover Letter ──────────────────────────────────────────────────────────────
async function generateCoverLetter() {
  var resume = document.getElementById("resume").value.trim();
  var jobDesc = document.getElementById("jobDesc").value.trim();
  var btn = document.getElementById("coverBtn");
  if (!resume || !jobDesc) { setStatus("error", "Please fill in both fields."); return; }

  btn.disabled = true;
  setStatus("", '<span class="spinner"></span>Writing cover letter...');
  document.getElementById("coverSection").style.display = "none";
  coverText = "";
  synState.cover = { active: false, data: null, currentText: "" };

  try {
    var r = await fetch("/.netlify/functions/cover-letter", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume: resume, jobDescription: jobDesc })
    });
    if (!r.ok) throw new Error("Server returned " + r.status);
    var d = await r.json();
    if (d.result) {
      coverText = d.result;
      synState.cover.currentText = coverText;
      document.getElementById("coverOutput").innerText = coverText;
      document.getElementById("coverSynBtn").innerText = "\u2731 Synonym Swap";
      document.getElementById("coverSection").style.display = "block";
      document.getElementById("coverSection").scrollIntoView({ behavior: "smooth", block: "start" });
      setStatus("success", "Cover letter ready.");
    } else { throw new Error(d.error || "No result returned"); }
  } catch(err) { setStatus("error", "Error: " + err.message); }
  finally { btn.disabled = false; }
}

// ── Synonym Swap ──────────────────────────────────────────────────────────────
async function toggleSynonymView(which) {
  var state = synState[which];
  var wrapId = which === "resume" ? "resumeOutputWrap" : "coverOutputWrap";
  var btnId = which === "resume" ? "resumeSynBtn" : "coverSynBtn";
  var btn = document.getElementById(btnId);

  // If already active, toggle back to plain view
  if (state.active) {
    state.active = false;
    var plainDiv = document.createElement("div");
    plainDiv.id = which === "resume" ? "output" : "coverOutput";
    plainDiv.className = "text-output";
    plainDiv.innerText = state.currentText;
    document.getElementById(wrapId).innerHTML = "";
    document.getElementById(wrapId).appendChild(plainDiv);
    btn.innerText = "\u2731 Synonym Swap";
    return;
  }

  // Fetch synonym data
  btn.disabled = true;
  btn.innerText = "Analyzing...";

  try {
    var r = await fetch("/.netlify/functions/synonym-swap", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: state.currentText })
    });
    if (!r.ok) throw new Error("Server returned " + r.status);
    var d = await r.json();

    if (d.sentences) {
      state.data = d.sentences;
      state.active = true;
      renderSynonymView(which);
      btn.innerText = "\u2715 Exit Synonym Swap";
    } else {
      throw new Error(d.error || "No synonym data returned");
    }
  } catch(err) {
    alert("Synonym Swap error: " + err.message);
    btn.innerText = "\u2731 Synonym Swap";
  } finally {
    btn.disabled = false;
  }
}

function renderSynonymView(which) {
  var state = synState[which];
  var wrapId = which === "resume" ? "resumeOutputWrap" : "coverOutputWrap";
  var wrap = document.getElementById(wrapId);

  // Build a lookup from sentence text -> adjective data
  var sentenceMap = {};
  (state.data || []).forEach(function(item) {
    sentenceMap[item.sentence.trim()] = item.adjectives;
  });

  // Split the current text into sentences preserving line breaks
  var lines = state.currentText.split("\n");
  var html = '<div class="syn-output">';

  lines.forEach(function(line) {
    if (!line.trim()) {
      html += '<span class="plain-line">&nbsp;</span>';
      return;
    }

    // Split line into sentences
    var sentences = line.match(/[^.!?]+[.!?]?/g) || [line];
    var lineHtml = "";

    sentences.forEach(function(sentence) {
      var trimmed = sentence.trim();
      if (!trimmed) return;
      var adjData = sentenceMap[trimmed];

      if (!adjData || adjData.length === 0) {
        lineHtml += esc(sentence);
        return;
      }

      // Build annotated sentence
      var annotated = sentence;
      adjData.forEach(function(adj) {
        var synId = "syn_" + which + "_" + Math.random().toString(36).substr(2, 8);
        var synHtml = buildSynHtml(adj.word, adj.synonyms, synId, which);
        // Replace the adjective word in the sentence (whole word match)
        var re = new RegExp("\\b" + escRegex(adj.word) + "\\b");
        annotated = annotated.replace(re, synHtml);
      });

      lineHtml += '<span class="syn-sentence">' + annotated + '</span>';
    });

    html += '<span class="plain-line">' + lineHtml + '</span>';
  });

  html += '</div>';
  wrap.innerHTML = html;
}

function buildSynHtml(word, synonyms, synId, which) {
  var synsHtml = synonyms.map(function(syn, i) {
    return '<span class="syn-alt-word" onclick="selectSynonym(this, \'' + synId + '\', \'' + esc(syn) + '\', \'' + which + '\')">' + esc(syn) + '</span>';
  }).join('<span class="syn-bracket">/</span>');

  return '<span class="focus-word" id="fw_' + synId + '">' + esc(word) + '</span>' +
         '<span class="syn-bracket"> [</span>' + synsHtml + '<span class="syn-bracket" id="cb_' + synId + '">]</span>';
}

function selectSynonym(el, synId, syn, which) {
  // Deselect any previously selected alt in this group
  var bracket = document.getElementById("cb_" + synId);
  if (!bracket) return;

  // Find all alt words in this group
  var groupEl = bracket.parentElement;
  var alts = groupEl.querySelectorAll(".syn-alt-word");
  alts.forEach(function(a) {
    a.classList.remove("selected");
  });

  // Remove existing Change button if present
  var existingBtn = groupEl.querySelector(".btn-change");
  if (existingBtn) existingBtn.remove();

  // Select this one
  el.classList.add("selected");

  // Insert Change button after the closing bracket
  var changeBtn = document.createElement("button");
  changeBtn.className = "btn-change";
  changeBtn.innerText = "Change?";
  changeBtn.onclick = function() {
    confirmChange(synId, syn, which);
  };
  bracket.insertAdjacentElement("afterend", changeBtn);
}

function confirmChange(synId, newWord, which) {
  var state = synState[which];
  var focusEl = document.getElementById("fw_" + synId);
  if (!focusEl) return;

  // Get old word (strip quotes added by CSS — use data attribute)
  var oldWord = focusEl.innerText;

  // Update the currentText with the new word
  var re = new RegExp("\\b" + escRegex(oldWord) + "\\b");
  state.currentText = state.currentText.replace(re, newWord);

  // Also update the text store
  if (which === "resume") { optimizedText = state.currentText; }
  else { coverText = state.currentText; }

  // Re-render synonym view with updated text and fresh data
  state.data = null;
  state.active = false;
  var btnId = which === "resume" ? "resumeSynBtn" : "coverSynBtn";
  document.getElementById(btnId).innerText = "\u2731 Synonym Swap";

  // Show plain updated text first
  var wrapId = which === "resume" ? "resumeOutputWrap" : "coverOutputWrap";
  var outputId = which === "resume" ? "output" : "coverOutput";
  var plainDiv = document.createElement("div");
  plainDiv.id = outputId;
  plainDiv.className = "text-output";
  plainDiv.innerText = state.currentText;
  document.getElementById(wrapId).innerHTML = "";
  document.getElementById(wrapId).appendChild(plainDiv);

  setStatus("success", "Word updated. Run Synonym Swap again to continue editing.");
}

function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

// ── Fit PDF ───────────────────────────────────────────────────────────────────
function downloadFitPdf() {
  if (!fitData) return;
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit: "pt", format: "letter" });
  var margin = 60;
  var maxWidth = doc.internal.pageSize.getWidth() - margin * 2;
  var y = margin;

  function addLine(text, size, bold, color, gap) {
    doc.setFontSize(size || 11);
    doc.setFont("helvetica", bold ? "bold" : "normal");
    doc.setTextColor.apply(doc, color || [30, 30, 24]);
    var lines = doc.splitTextToSize(String(text), maxWidth);
    lines.forEach(function(l) {
      if (y + 16 > doc.internal.pageSize.getHeight() - margin) { doc.addPage(); y = margin; }
      doc.text(l, margin, y);
      y += 15;
    });
    y += (gap || 4);
  }

  var verdictLabel = { strong: "Strong Fit", partial: "Partial Fit", weak: "Weak Fit" }[fitData.verdict] || "Partial Fit";
  addLine("Fit Analysis", 18, true, null, 4);
  addLine(verdictLabel + " — " + (fitData.score || 0) + "% Match", 13, true, [46, 92, 62], 8);
  addLine(fitData.headline || "", 11, false, null, 10);
  addLine("WHERE ALIGNMENT EXISTS", 9, true, [122, 120, 112], 6);
  (fitData.alignment || []).forEach(function(item) {
    addLine(item.title, 11, true, null, 2);
    addLine(item.detail, 10, false, [122, 120, 112], 6);
  });
  y += 4;
  addLine("CRITICAL GAPS TO ADDRESS", 9, true, [122, 120, 112], 6);
  (fitData.gaps || []).forEach(function(item) {
    addLine(item.title, 11, true, null, 2);
    addLine(item.detail, 10, false, [122, 120, 112], 6);
  });
  if (fitData.compensation) { y += 4; addLine(fitData.compensation, 10, false, [122, 120, 112], 8); }
  y += 8;
  addLine(fitData.summary || "", 11, false, null, 6);
  addLine(fitData.directions || "", 10, false, [122, 120, 112], 0);
  doc.save("fit-analysis.pdf");
}

// ── TXT / PDF / Word ──────────────────────────────────────────────────────────
function downloadTxt(which) {
  var text = which === "cover" ? coverText : optimizedText;
  if (!text) return;
  triggerDownload(new Blob([text], { type: "text/plain" }), which === "cover" ? "cover-letter.txt" : "optimized-resume.txt");
}

function downloadPdf(which) {
  var text = which === "cover" ? coverText : optimizedText;
  if (!text) return;
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit: "pt", format: "letter" });
  var margin = 60;
  var maxWidth = doc.internal.pageSize.getWidth() - margin * 2;
  var lh = 15; var y = margin;
  doc.setFont("helvetica", "normal"); doc.setFontSize(11);
  var lines = doc.splitTextToSize(text, maxWidth);
  lines.forEach(function(line) {
    if (y + lh > doc.internal.pageSize.getHeight() - margin) { doc.addPage(); y = margin; }
    doc.text(line, margin, y); y += lh;
  });
  doc.save(which === "cover" ? "cover-letter.pdf" : "optimized-resume.pdf");
}

async function downloadDocx(which) {
  var text = which === "cover" ? coverText : optimizedText;
  var btnId = which === "cover" ? "coverWordBtn" : "wordBtn";
  var fname = which === "cover" ? "cover-letter.docx" : "optimized-resume.docx";
  var btn = document.getElementById(btnId);
  if (!text) return;
  btn.innerText = "Building..."; btn.disabled = true;
  try {
    var D = window.docx;
    var paragraphs = text.split("\n").map(function(line) {
      var t = line.trim();
      var isBullet = t.startsWith("-") || t.startsWith("*") || t.startsWith("\u2022");
      return new D.Paragraph({ children: [new D.TextRun({ text: t, size: 22, font: "Calibri" })], spacing: { after: isBullet ? 60 : 160 }, indent: isBullet ? { left: 360 } : {} });
    });
    var document = new D.Document({ sections: [{ children: paragraphs }] });
    var blob = await D.Packer.toBlob(document);
    triggerDownload(blob, fname);
  } catch(err) { alert("Word export failed: " + err.message); }
  finally { btn.innerHTML = "&#8595; Word"; btn.disabled = false; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(cls, msg) {
  var el = document.getElementById("status");
  el.className = "status-text" + (cls ? " " + cls : "");
  el.innerHTML = msg;
}

function esc(str) {
  if (!str) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function triggerDownload(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
